<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Taskflow App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Taskflow</h1>
  </header>

  <div class="container">
    
    <aside>
      <h3>Categorías</h3>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Urgente</li>
      </ul>
    </aside>

    <main>
      <section class="task-list">
        
        <article class="task high">
          <span class="title">Diseñar landing page</span>
          <span class="category">Trabajo</span>
          <span class="badge">Alta</span>
        </article>

        <article class="task medium">
          <span class="title">Comprar materiales</span>
          <span class="category">Personal</span>
          <span class="badge">Media</span>
        </article>

        <article class="task low">
          <span class="title">Leer documentación</span>
          <span class="category">Estudio</span>
          <span class="badge">Baja</span>
        </article>

      </section>
    </main>

  </div>

</body>
</html>
