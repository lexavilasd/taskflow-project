<!DOCTYPE html>
<html lang="es" class="transition-colors duration-300">
<head>
<meta charset="UTF-8">
<title>Taskflow</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">

<header class="p-6 bg-white dark:bg-gray-800 shadow flex justify-between items-center">

<h1 class="text-2xl font-bold">Taskflow</h1>

<button id="themeToggle"
class="px-3 py-2 rounded bg-gray-200 dark:bg-gray-700">
🌙
</button>

</header>

<main class="max-w-2xl mx-auto p-6">

<form id="taskForm" class="flex gap-2 mb-6">

<input
id="taskInput"
type="text"
placeholder="Nueva tarea..."
class="flex-1 p-2 border rounded dark:bg-gray-800"
/>

<button
class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
Añadir
</button>

</form>

<ul id="taskList" class="space-y-2"></ul>

</main>

<script src="app.js"></script>

</body>
</html>
